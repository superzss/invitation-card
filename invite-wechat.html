<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>婚礼请柬 · 我们结婚啦</title>
    <meta name="description" content="诚挚邀请您参加我们的婚礼" />
    <style>
      :root {
        --bg: #fff1f0;
        --card: rgba(255, 255, 255, 0.78);
        --text: #4a1f24;
        --primary: #d0011b;
        --primary-dark: #a00016;
        --gold: #c9963e;
        --line: #efbcc3;
        --shadow: 0 14px 30px rgba(208, 1, 27, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif;
        background:
          radial-gradient(circle at top, #ffcdcd 0%, var(--bg) 52%),
          repeating-linear-gradient(
            135deg,
            rgba(201, 150, 62, 0.06) 0 8px,
            rgba(201, 150, 62, 0) 8px 18px
          );
        min-height: 100vh;
      }

      .invite {
        width: min(100%, 520px);
        margin: 0 auto;
        padding: 16px 14px calc(30px + env(safe-area-inset-bottom));
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 20px;
        padding: 18px;
        margin: 12px 0;
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        padding: 1px;
        background: linear-gradient(140deg, rgba(201, 150, 62, 0.45), rgba(201, 150, 62, 0));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
      }

      .hero {
        text-align: center;
        padding: 30px 18px;
        background: linear-gradient(165deg, #fff8f6 0%, #ffcfd2 100%);
      }

      .couple-photo {
        width: min(60vw, 220px);
        aspect-ratio: 3 / 4;
        margin: 0 auto 12px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.28);
        box-shadow:
          0 14px 26px rgba(201, 31, 55, 0.2),
          inset 0 0 0 1px rgba(255, 255, 255, 0.55);
        overflow: hidden;
        position: relative;
      }

      .couple-photo::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 20% 15%, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0) 36%),
          linear-gradient(180deg, rgba(255, 255, 255, 0) 62%, rgba(255, 205, 205, 0.2) 100%);
        pointer-events: none;
      }

      .couple-image,
      .couple-illustration {
        width: 112%;
        height: 112%;
        display: block;
        object-fit: cover;
        transform: scale(1.02) translateY(2px);
        filter: saturate(1.08) contrast(1.03);
      }

      .eyebrow {
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin: 0;
        font-size: 12px;
        color: #b56b2a;
      }

      h1 {
        margin: 8px 0;
        font-size: clamp(28px, 7.2vw, 38px);
        color: #b4001a;
        text-shadow: 0 2px 10px rgba(212, 116, 46, 0.25);
      }

      h2 {
        margin: 0 0 10px;
        font-size: 20px;
        color: #b3001b;
      }

      .names,
      .date {
        margin: 6px 0;
        font-size: 15px;
      }

      ul {
        margin: 0;
        padding-left: 1.2rem;
      }

      li {
        margin: 9px 0;
        line-height: 1.45;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        text-decoration: none;
        border-radius: 999px;
        background: linear-gradient(135deg, #d0011b 0%, #b3001b 65%, #a00016 100%);
        color: #fff;
        padding: 11px 18px;
        margin-top: 8px;
        font-weight: 600;
        box-shadow: 0 8px 18px rgba(201, 31, 55, 0.28);
        border: 1px solid rgba(201, 150, 62, 0.35);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn-light {
        background: linear-gradient(180deg, #fff 0%, #fff5f0 100%);
        color: var(--primary-dark);
        border: 1px solid #e7b38a;
        box-shadow: none;
      }

      .action-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .tip {
        font-size: 13px;
        color: #8b4f57;
        margin-top: 10px;
      }

      .music-btn {
        position: fixed;
        right: 12px;
        top: 12px;
        z-index: 10;
        width: 44px;
        height: 44px;
        border: none;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 242, 236, 0.9));
        color: var(--primary-dark);
        box-shadow: var(--shadow);
        border: 1px solid rgba(201, 150, 62, 0.35);
      }

      .music-btn.playing span {
        display: inline-block;
        animation: spin 2.4s linear infinite;
      }

      dialog {
        width: min(92vw, 420px);
        border: none;
        border-radius: 16px;
        padding: 0;
      }

      dialog::backdrop {
        background: rgba(0, 0, 0, 0.35);
      }

      #rsvpForm {
        padding: 16px;
      }

      label {
        display: block;
        margin: 10px 0;
        font-size: 14px;
      }

      input,
      select,
      textarea {
        width: 100%;
        margin-top: 6px;
        border: 1px solid #e7b3bb;
        border-radius: 10px;
        padding: 10px;
        font: inherit;
      }

      menu {
        margin: 8px 0 0;
        padding: 0;
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (min-width: 768px) {
        .invite {
          padding-top: 24px;
        }
      }

      @media (max-width: 767px) {
        .invite {
          padding-top: 8px;
        }

        .hero {
          min-height: calc(100svh - 32px);
          display: flex;
          flex-direction: column;
          justify-content: space-between;
          align-items: center;
          gap: 8px;
          padding: 18px 14px 16px;
        }

        .couple-photo {
          width: min(58vw, 205px);
          margin-bottom: 8px;
        }

        .eyebrow {
          font-size: 11px;
        }

        h1 {
          margin: 4px 0;
          font-size: clamp(24px, 8vw, 32px);
        }

        .names,
        .date {
          margin: 2px 0;
          font-size: 14px;
        }

        .hero .btn {
          margin-top: 4px;
        }
      }
    </style>
  </head>
  <body>
    <audio id="bgm" loop preload="none">
      <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5d65f4c9af.mp3?filename=wedding-ambient-piano-110624.mp3" type="audio/mpeg" />
    </audio>

    <button class="music-btn" id="musicBtn" aria-label="背景音乐开关">
      <span>♫</span>
    </button>

    <main class="invite">
      <section class="card hero">
        <div class="couple-photo" aria-label="新人照片占位">
          <img class="couple-image" src="pic/参考图.jpg" alt="新人照片" loading="eager" />
        </div>
        <p class="eyebrow">Wedding Invitation</p>
        <h1>我们结婚啦</h1>
        <p class="names">新郎：张三 &nbsp;·&nbsp; 新娘：李四</p>
        <p class="date">5.20</p>
        <a href="#detail" class="btn">查看详情</a>
      </section>

      <section class="card" id="detail">
        <h2>诚挚邀请</h2>
        <p>
          亲爱的家人和朋友：<br />
          我们将携手步入婚姻殿堂，诚邀您见证这份幸福与承诺。
        </p>
      </section>

      <section class="card info">
        <h2>婚礼信息</h2>
        <ul>
          <li><strong>婚礼日期：</strong>5.20</li>
          <li><strong>婚礼时间：</strong>12:00</li>
          <li><strong>举办地点：</strong>XX婚礼宴会中心</li>
          <li><strong>详细地址：</strong>XX市XX区XX路XX号</li>
        </ul>
      </section>

      <section class="card actions">
        <h2>到场与回执</h2>
        <div class="action-group">
          <a
            class="btn"
            id="mapBtn"
            href="https://uri.amap.com/search?keyword=XX市XX区XX路XX号&src=mypage&callnative=0"
            target="_blank"
            rel="noopener noreferrer"
          >
            一键导航
          </a>
          <button class="btn btn-light" id="rsvpBtn">填写回执</button>
        </div>
        <p class="tip">温馨提示：请于 5 月 10 日前回复是否出席。</p>
      </section>
    </main>

    <dialog id="rsvpDialog">
      <form id="rsvpForm" method="dialog">
        <h3>婚礼回执</h3>
        <label>
          您的姓名
          <input name="name" required placeholder="请输入姓名" />
        </label>
        <label>
          是否出席
          <select name="attend" required>
            <option value="">请选择</option>
            <option value="出席">出席</option>
            <option value="无法出席">无法出席</option>
          </select>
        </label>
        <label>
          同行人数
          <input type="number" name="count" min="0" max="10" value="1" />
        </label>
        <label>
          留言祝福
          <textarea name="message" rows="3" placeholder="写下祝福吧～"></textarea>
        </label>
        <menu>
          <button value="cancel" class="btn btn-light" type="button" id="closeDialog">取消</button>
          <button value="default" class="btn" type="submit">提交</button>
        </menu>
      </form>
    </dialog>

    <script>
      const musicBtn = document.getElementById('musicBtn');
      const bgm = document.getElementById('bgm');
      const rsvpBtn = document.getElementById('rsvpBtn');
      const rsvpDialog = document.getElementById('rsvpDialog');
      const closeDialog = document.getElementById('closeDialog');
      const rsvpForm = document.getElementById('rsvpForm');

      let musicReady = false;

      function toggleMusic() {
        if (!musicReady) {
          bgm.volume = 0.4;
          musicReady = true;
        }

        if (bgm.paused) {
          bgm
            .play()
            .then(() => {
              musicBtn.classList.add('playing');
            })
            .catch(() => {});
        } else {
          bgm.pause();
          musicBtn.classList.remove('playing');
        }
      }

      musicBtn.addEventListener('click', toggleMusic);

      rsvpBtn.addEventListener('click', () => {
        if (typeof rsvpDialog.showModal === 'function') {
          rsvpDialog.showModal();
        } else {
          alert('当前浏览器不支持弹窗表单，请直接联系新人回复。');
        }
      });

      closeDialog.addEventListener('click', () => {
        rsvpDialog.close();
      });

      rsvpForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const data = new FormData(rsvpForm);
        const payload = {
          name: data.get('name'),
          attend: data.get('attend'),
          count: data.get('count'),
          message: data.get('message')
        };

        localStorage.setItem('wedding-rsvp', JSON.stringify(payload));
        alert('感谢回复，已收到您的回执！');
        rsvpDialog.close();
        rsvpForm.reset();
      });
    </script>
  </body>
</html>
