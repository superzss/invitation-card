server {
    listen 80;
    server_name invite.example.com;

    root /var/www/wedding-invite;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|mp3)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
